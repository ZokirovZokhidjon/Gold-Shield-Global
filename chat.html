<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Gold Shield Global</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #003366; color: #FFD700; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; background: #fff; }
        .input-area { padding: 15px; background: #e9e9e9; display: flex; gap: 10px; }
        #user-list { width: 250px; background: #f8f9fa; border-left: 1px solid #ddd; padding: 15px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h3 id="chatTitle">Gold Shield Global</h3>
    <div>
        <button onclick="startCall('audio')">📞 Аудио</button>
        <button onclick="startCall('video')">📹 Видео</button>
        <select onchange="changeLanguage(this.value)" id="langSelect">
            <option value="uz">O'zbekcha</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
        </select>
        <button id="exitBtn" onclick="exitChat()">Чиқиш</button>
    </div>
</div>

<div class="main-container">
    <div id="chat-area">
        <div id="meet" style="display:none; height:400px; border-bottom: 2px solid #003366;"></div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msgInput" style="flex:1" placeholder="..." 
       onkeydown="if(event.key === 'Enter') sendMessage()">
            
            <button id="sendBtn" onclick="sendMessage()">Юбориш</button>
        </div>
    </div>
    <div id="user-list">
        <h4 id="participantTitle">Иштирокчилар</h4>
        <div><span class="status-dot" style="background:#28a745;"></span> Мен (Онлайн)</div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U", projectId: "gshn-70234", storageBucket: "gshn-70234.firebasestorage.app" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    // Тил созламалари
    const translations = {
        uz: { chatTitle: "Gold Shield Global", sendBtn: "Юбориш", msgPlaceholder: "Хабарни киритинг...", participants: "Иштирокчилар", exit: "Чиқиш" },
        ru: { chatTitle: "Gold Shield Global", sendBtn: "Отправить", msgPlaceholder: "Введите сообщение...", participants: "Участники", exit: "Выход" },
        en: { chatTitle: "Gold Shield Global", sendBtn: "Send", msgPlaceholder: "Enter message...", participants: "Participants", exit: "Exit" }
    };

    function updateUI(lang) {
        const t = translations[lang] || translations.uz;
        document.getElementById("chatTitle").innerText = t.chatTitle;
        document.getElementById("sendBtn").innerText = t.sendBtn;
        document.getElementById("msgInput").placeholder = t.msgPlaceholder;
        document.getElementById("participantTitle").innerText = t.participants;
        document.getElementById("exitBtn").innerText = t.exit;
    }

    function changeLanguage(lang) {
        localStorage.setItem("selectedLang", lang);
        updateUI(lang);
    }

    // Ишга тушишда сақланган тилни ўқиш
    window.onload = () => {
        const savedLang = localStorage.getItem("selectedLang") || "uz";
        document.getElementById("langSelect").value = savedLang;
        updateUI(savedLang);
    };

    window.startCall = function(type) {
        const meetDiv = document.getElementById('meet');
        meetDiv.style.display = 'block';
        const api = new JitsiMeetExternalAPI("meet.jit.si", {
            roomName: 'GoldShieldGlobalRoom', parentNode: meetDiv,
            configOverwrite: { startWithVideoMuted: (type === 'audio'), disableDeepLinking: true },
            interfaceConfigOverwrite: { SHOW_JITSI_WATERMARK: false, SHOW_POWERED_BY: false, SHOW_BRAND_WATERMARK: false }
        });
        api.addListener('videoConferenceLeft', () => { meetDiv.style.display = 'none'; meetDiv.innerHTML = ""; });
    };

    window.sendMessage = () => {
        const input = document.getElementById("msgInput");
        if (input.value.trim() !== "") {
            db.collection("chats").add({ text: input.value, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
        }
    };

    db.collection("chats").orderBy("timestamp", "asc").onSnapshot(snap => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        snap.forEach(doc => { 
            win.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee;">${doc.data().text}</div>`; 
        });
    });

    window.exitChat = () => { localStorage.clear(); window.location.href = "index.html"; };
</script>
</body>
</html>
