<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Shield Global</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #003366; color: #FFD700; padding: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            #user-list { width: 100%; border-top: 1px solid #ddd; height: 100px; }
        }

        #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .input-area { padding: 10px; background: #e9e9e9; display: flex; gap: 5px; }
        
        input[type="text"] { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        #user-list { width: 250px; background: #f8f9fa; border-left: 1px solid #ddd; padding: 15px; overflow-y: auto; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 5px; border: none; background: #0056b3; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h3 id="chatTitle" style="margin:0">Gold Shield Global</h3>
    <div style="display:flex; gap:5px;">
        <button onclick="startCall('audio')">📞</button>
        <button onclick="startCall('video')">📹</button>
        <select onchange="changeLanguage(this.value)" id="langSelect">
            <option value="uz">🇺🇿 O'zbekcha</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="en">🇬🇧 English</option>
        </select>
        <button id="exitBtn" onclick="exitChat()">Exit</button>
    </div>
</div>

<div class="main-container">
    <div id="chat-area">
        <div id="meet" style="display:none; height:300px; border-bottom: 2px solid #003366;"></div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="...">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <div id="user-list">
        <h4 id="participantTitle">Participants</h4>
        <div><span style="background:#28a745; width:10px; height:10px; border-radius:50%; display:inline-block;"></span> You</div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U", projectId: "gshn-70234", storageBucket: "gshn-70234.firebasestorage.app" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    const translations = {
        uz: { chatTitle: "Gold Shield Global", sendBtn: "Юбориш", msgPlaceholder: "Хабарни киритинг...", participants: "Иштирокчилар", exit: "Чиқиш" },
        ru: { chatTitle: "Gold Shield Global", sendBtn: "Отправить", msgPlaceholder: "Введите сообщение...", participants: "Участники", exit: "Выход" },
        en: { chatTitle: "Gold Shield Global", sendBtn: "Send", msgPlaceholder: "Enter message...", participants: "Participants", exit: "Exit" }
    };

    function updateUI(lang) {
        const t = translations[lang] || translations.uz;
        document.getElementById("chatTitle").innerText = t.chatTitle;
        document.getElementById("sendBtn").innerText = t.sendBtn;
        document.getElementById("msgInput").placeholder = t.msgPlaceholder;
        document.getElementById("participantTitle").innerText = t.participants;
        document.getElementById("exitBtn").innerText = t.exit;
    }

    function changeLanguage(lang) {
        localStorage.setItem("selectedLang", lang);
        updateUI(lang);
    }

    window.onload = () => {
        const savedLang = localStorage.getItem("selectedLang") || "uz";
        document.getElementById("langSelect").value = savedLang;
        updateUI(savedLang);
    };

    window.sendMessage = () => {
        const input = document.getElementById("msgInput");
        if (input.value.trim() !== "") {
            db.collection("chats").add({ text: input.value, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
            input.blur(); // Мобилда клавиатурани ёпиш учун
        }
    };

    db.collection("chats").orderBy("timestamp", "asc").onSnapshot(snap => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        snap.forEach(doc => { 
            win.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee;">${doc.data().text}</div>`; 
        });
        win.scrollTop = win.scrollHeight;
    });

    window.startCall = function(type) {
        const meetDiv = document.getElementById('meet');
        meetDiv.style.display = 'block';
        new JitsiMeetExternalAPI("meet.jit.si", { roomName: 'GoldShieldGlobalRoom', parentNode: meetDiv });
    };

    window.exitChat = () => { window.location.href = "index.html"; };
</script>
</body>
</html>
