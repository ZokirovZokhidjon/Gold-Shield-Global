<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Gold Shield Global - Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://meet.jit.si/external_api.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U",
            authDomain: "gshn-70234.firebaseapp.com",
            projectId: "gshn-70234",
            storageBucket: "gshn-70234.firebasestorage.app",
            messagingSenderId: "241219226789",
            appId: "1:241219226789:web:af19a95f91a30781aa114c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.currentRoom = "General";
        window.jitsiApi = null;
        window.targetRoom = "";
        let unsubscribe = null;

        // 1. Guruhdan chiqish funksiyasi
        window.exitGroup = () => {
            window.currentRoom = "General";
            document.getElementById("chat-window").innerHTML = "<div style='text-align:center; margin-top:20px;'>Guruhdan chiqdingiz.</div>";
            window.loadMessages();
        };

        window.startVideoCall = () => {
            document.getElementById("video-container").style.display = "block";
            const container = document.getElementById("video-container-frame");
            window.jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { 
                roomName: 'GoldShield_' + window.currentRoom, 
                width: '100%', height: '100%', 
                parentNode: container 
            });
        };

        window.stopVideoCall = () => { 
            if (window.jitsiApi) { window.jitsiApi.dispose(); window.jitsiApi = null; }
            document.getElementById("video-container").style.display = "none"; 
        };

        window.sendMessage = async () => {
            const input = document.getElementById("msgInput");
            if (!input.value.trim()) return;
            await addDoc(collection(db, "groups", window.currentRoom, "messages"), { text: input.value, timestamp: serverTimestamp() });
            input.value = "";
            input.focus();
        };

        window.handleKeyPress = (event) => { if (event.key === 'Enter') window.sendMessage(); };

        window.loadMessages = () => {
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(query(collection(db, "groups", window.currentRoom, "messages"), orderBy("timestamp", "asc")), (snap) => {
                const win = document.getElementById("chat-window");
                win.innerHTML = "";
                snap.forEach(d => win.innerHTML += `<div class="msg">${d.data().text}</div>`);
                win.scrollTop = win.scrollHeight;
            });
        };

        window.loadMessages();

        window.saveNewGroup = async () => {
            const name = document.getElementById("newGroupName").value.trim();
            const pass = document.getElementById("newGroupPass").value.trim();
            if (!name) return;
            await setDoc(doc(db, "groups", name), { createdAt: serverTimestamp(), password: pass });
            document.getElementById("create-modal").style.display = "none";
        };

        window.enterGroup = async (name) => {
            const groupDoc = await getDoc(doc(db, "groups", name));
            if (groupDoc.data()?.password) {
                window.targetRoom = name;
                document.getElementById("password-modal").style.display = "flex";
            } else {
                window.currentRoom = name;
                window.loadMessages();
            }
        };

        window.checkGroupPassword = async () => {
            const inputPass = document.getElementById("passInput").value;
            const groupDoc = await getDoc(doc(db, "groups", window.targetRoom));
            if (inputPass === groupDoc.data().password) {
                window.currentRoom = window.targetRoom;
                window.loadMessages();
                document.getElementById("password-modal").style.display = "none";
                document.getElementById("passInput").value = "";
            } else { alert("❌ Parol noto‘g‘ri!"); }
        };

        window.deleteGroup = async (id) => { if(confirm("O'chirilsinmi?")) await deleteDoc(doc(db, "groups", id)); };

        onSnapshot(collection(db, "groups"), (snap) => {
            const list = document.getElementById("group-list");
            list.innerHTML = "";
            snap.forEach((doc) => {
                list.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;">
                    <button class="group-item" style="flex:1" onclick="enterGroup('${doc.id}')">${doc.id}</button>
                    <button onclick="deleteGroup('${doc.id}')">🗑️</button>
                </div>`;
            });
        });
    </script>
    <style>
/* Asosiy sozlamalar */
    body { background: #0e1621; color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

    /* Layout: Kompyuterda yonma-yon, mobilda ustma-ust */
    @media (min-width: 768px) {
        body { flex-direction: row; }
        #sidebar { width: 320px !important; }
    }

    #sidebar { width: 100%; background: #17212b; padding: 15px; box-sizing: border-box; }
    
    .group-item { padding: 10px; background: #242f3d; color: white; border: none; cursor: pointer; text-align: left; border-radius: 5px; width: 100%; }
    .group-item:hover { background: orangered; }
    
    #chat-area { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
    #chat-window { flex: 1; background: #182533; padding: 15px; overflow-y: auto; border-radius: 8px; margin-bottom: 10px; }
    
    .msg { padding: 8px 0; border-bottom: 1px solid #101924; }
    .orange-btn { border-radius: 20px; width: 100%; height: 50px; background-color: orangered; border: none; color: white; font-weight: bold; cursor: pointer; }
    
    #video-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background: black; }

    /* Input maydonini mobilda to'g'rilash */
    #msgInput { padding: 10px; border-radius: 5px; border: none; width: 100%; box-sizing: border-box; }    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Гуруҳлар</h3>
        <button class="orange-btn" onclick="document.getElementById('create-modal').style.display='flex'">+ Гуруҳ яратиш</button>
        <div id="group-list" style="margin-top: 10px;"></div>
    </div>
    <div id="chat-area">
        <div id="header-menu" style="background: #242f3d; padding: 10px; display: flex; justify-content: space-between; align-items:center;">
            <button onclick="startVideoCall()" style="background:orangered; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">🎥 Видео/Аудио</button>
            <div>
                <!-- Guruhdan chiqish -->
                <button onclick="exitGroup()" style="background:gray; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Guruhdan chiqish</button>
                <!-- Tizimdan chiqish -->
                <a href="index.html" style="background:red; color:white; padding:8px 15px; border-radius:5px; text-decoration:none; margin-left:10px;">Tizimdan chiqish</a>
            </div>
        </div>
        <div id="chat-window"></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="text" id="msgInput" onkeydown="handleKeyPress(event)" style="flex:1; padding: 10px; border-radius:5px; border:none;" placeholder="Хабар...">
            <button onclick="sendMessage()" style="background:orangered; color:white; border:none; padding: 0 20px; border-radius:5px;">Юбориш</button>
        </div>
    </div>

    <!-- Video va Modallar o'zgarishsiz qoldi -->
    <div id="video-container">
        <div id="video-container-frame" style="width:100%; height:100%;"></div>
        <button onclick="stopVideoCall()" style="position:absolute; top:20px; right:20px; z-index:10001; padding:10px 20px; background:red; color:white; border:none; cursor:pointer;">X ЧИҚИШ</button>
    </div>

    <div id="create-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:#17212b; padding:30px; border-radius:15px; width:300px;">
            <input type="text" id="newGroupName" placeholder="Guruh nomi..." style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="password" id="newGroupPass" placeholder="Parol (ixtiyoriy)..." style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="orange-btn" onclick="saveNewGroup()">Saqlash</button>
            <button onclick="document.getElementById('create-modal').style.display='none'" style="width:100%; margin-top:10px; background:transparent; color:white; border:none;">Yopish</button>
        </div>
    </div>

<!-- Parol oynasi qismi -->
<div id="password-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; justify-content:center; align-items:center;">
    <div style="background:#17212b; padding:30px; border-radius:15px; width:300px; text-align:center;">
        <h3 style="color:white;">🔐 Parolni kiriting</h3>
        <input type="password" id="passInput" style="width:100%; padding:10px; margin:10px 0;">
        <button class="orange-btn" onclick="checkGroupPassword()">Kirish</button>
        <!-- Yopish tugmasi qo'shildi -->
        <button onclick="document.getElementById('password-modal').style.display='none'; document.getElementById('passInput').value='';" 
                style="width:100%; margin-top:10px; background:transparent; color:white; border:none; cursor:pointer;">
            Yopish
        </button>
    </div>
</div>
</body>
</html>
