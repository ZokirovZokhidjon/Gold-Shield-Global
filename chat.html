<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Gold Shield Global</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #003366; color: #FFD700; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; background: #fff; }
        .input-area { padding: 15px; background: #e9e9e9; display: flex; gap: 10px; }
        #user-list { width: 250px; background: #f8f9fa; border-left: 1px solid #ddd; padding: 15px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h3>Gold Shield Global</h3>
    <div>
        <button onclick="startCall('audio')">📞 Аудио</button>
        <button onclick="startCall('video')">📹 Видео</button>
        <a href="index.html" style="color: gold; text-decoration: solid; font-size: 18px;font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">❌ Чиқиш</a>
    </div>
</div>

<div class="main-container">
    <div id="chat-area">
        <div id="meet" style="display:none; height:400px; border-bottom: 2px solid #003366;"></div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msgInput" style="flex:1" placeholder="Хабар..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Юбориш</button>
        </div>
    </div>
    <div id="user-list">
        <h4>Иштирокчилар</h4>
        <div><span class="status-dot" style="background:#28a745;"></span> Мен (Онлайн)</div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U", projectId: "gshn-70234", storageBucket: "gshn-70234.firebasestorage.app" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    // 1. Қўнғироқ функцияси
    window.startCall = function(type) {
        const meetDiv = document.getElementById('meet');
        meetDiv.style.display = 'block';
        const api = new JitsiMeetExternalAPI("meet.jit.si", {
            roomName: 'GoldShieldGlobalRoom',
            parentNode: meetDiv,
            configOverwrite: { startWithVideoMuted: (type === 'audio'), disableDeepLinking: true },
            interfaceConfigOverwrite: { SHOW_JITSI_WATERMARK: false, SHOW_POWERED_BY: false, SHOW_BRAND_WATERMARK: false }
        });
        api.addListener('videoConferenceLeft', () => { meetDiv.style.display = 'none'; meetDiv.innerHTML = ""; });
    };

    // 2. Хабар юбориш
    window.sendMessage = () => {
        const input = document.getElementById("msgInput");
        if (input.value.trim() !== "") {
            db.collection("chats").add({ text: input.value, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
        }
    };

    // 3. Чатни янгилаб туриш
    db.collection("chats").orderBy("timestamp", "asc").onSnapshot(snap => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        snap.forEach(doc => { win.innerHTML += `<div>${doc.data().text}</div>`; });
    });

    window.exitChat = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
