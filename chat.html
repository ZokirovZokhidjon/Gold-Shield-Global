<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Gold Shield Chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #2b5278; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
       /* Header ичидаги тугмалар учун умумий услуб */
.header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Иконкали тугмалар учун каттароқ услуб */
.btn-icon {
    font-size: 24px; /* Камера ва телефон иконкаларини катта қилади */
    padding: 8px 15px;
    border-radius: 50%; /* Доира шаклида */
    border: none;
    cursor: pointer;
    background: #fff;
    transition: transform 0.2s;
}

.btn-icon:hover { transform: scale(1.1); }

/* Чиқиш тугмаси */
.btn-exit {
    background: #d9534f;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
        #meet { width: 100%; height: 500px; display: none; background: #000; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; background: white; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #f4f4f4; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 15px; border-radius: 20px; border: none; background: #2b5278; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h3>Gold Shield Global</h3>
    
    <div class="header-actions">
        <button class="btn-icon" onclick="startCall('audio')" title="Аудио қўнғироқ">📞</button>
        <button class="btn-icon" onclick="startCall('video')" title="Видео қўнғироқ">📹</button>
        <button class="btn-exit" onclick="exitChat()">❌ Чиқиш</button>
    </div>
</div>
<div id="meet"></div>
<div id="chat-window"></div>

<div class="input-area" id="inputArea">
    <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this)">
    <button onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="text" id="msgInput" placeholder="Хабар..." onkeypress="handleEnter(event)">
    <button onclick="sendMessage()">✈️</button>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U",
        projectId: "gshn-70234",
        storageBucket: "gshn-70234.firebasestorage.app"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const storage = firebase.storage();

 
 
    // 1. Блокни текшириш функцияси (Энг тепада бўлиши керак)
    function checkBlockStatus() {
        if (localStorage.getItem("isBlocked") === "true") {
            // Чатни ва барча тугмаларни яшириш
            document.body.innerHTML = `
                <div style="text-align: center; padding: 50px; font-family: sans-serif;">
                    <h2 style="color: red;">🚫 Сиз чатдан четлаштирилгансиз!</h2>
                    <p>Қоидаларни бузганингиз учун ёзиш имконияти чекланди.</p>
                    <button onclick="exitChat()" style="padding: 15px 30px; background: #d9534f; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 18px;">
                        ❌ Чиқиш ва қайта кириш
                    </button>
                </div>
            `;
            return true;
        }
        return false;
    }

    // Блокда бўлса, коднинг қолганини ишлатмаймиз
    if (checkBlockStatus()) {
        window.exitChat = function() {
            localStorage.clear();
            location.reload();
        };
    } else {
        // Агар блокда бўлмаса, Firebase ва чат функцияларини юклаймиз
        firebase.initializeApp(config);
        // ... (қолган барча Firebase ва Jitsi кодларингиз шу ерга)
    } 

    // Ишга тушиш вақтида текшириш
    checkBlockStatus();

    window.exitChat = function() {
        localStorage.clear();
        location.reload();
    };

    window.handleEnter = (e) => { if (e.key === 'Enter') sendMessage(); };

    window.sendMessage = function() {
        const input = document.getElementById("msgInput");
        const val = input.value.trim();
        if (!val) return;

        const badWords = ["придурки", "долбаеб", "аҳмоқ", "пидараз"];
        if (badWords.some(w => val.toLowerCase().includes(w))) {
            let warns = parseInt(localStorage.getItem("warns") || "0") + 1;
            localStorage.setItem("warns", warns);
            if (warns >= 2) {
                localStorage.setItem("isBlocked", "true");
                alert("🚫 Сиз чатдан чиқарилдингиз!");
                location.reload(); 
            } else {
                alert("⚠️ Диққат! Агар яна ҳурматсизлик қилсангиз, чиқариб юбораман.");
            }
            input.value = ""; return;
        }

        db.collection("chats").add({ text: val, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        input.value = "";
    };

    window.uploadFile = async (input) => {
        if (checkBlockStatus()) return;
        const file = input.files[0];
        if (!file) return;
        const ref = storage.ref('uploads/' + Date.now() + '_' + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        db.collection("chats").add({ image: url, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    };

    db.collection("chats").orderBy("timestamp", "asc").onSnapshot(snap => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            win.innerHTML += d.image ? `<div><img src="${d.image}" width="150"></div>` : `<div>${d.text}</div>`;
        });
    });

    window.startCall = function() {
        if (checkBlockStatus()) return;
        const meetDiv = document.getElementById('meet');
        meetDiv.style.display = 'block';
        const api = new JitsiMeetExternalAPI("meet.jit.si", {
            roomName: 'GoldShieldGlobalRoom',
            parentNode: meetDiv
        });
        api.addListener('videoConferenceLeft', () => {
            meetDiv.style.display = 'none';
            meetDiv.innerHTML = "";
        });
    };
</script>
</body>
</html>
