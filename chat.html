<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Gold Shield Global - Chat</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U",
        authDomain: "gshn-70234.firebaseapp.com",
        projectId: "gshn-70234",
        storageBucket: "gshn-70234.firebasestorage.app",
        messagingSenderId: "241219226789",
        appId: "1:241219226789:web:af19a95f91a30781aa114c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    window.currentRoom = "General";
    window.jitsiApi = null; // window ga bog'ladik
    let unsubscribe = null;

    window.logout = () => {
        if (window.jitsiApi) window.jitsiApi.dispose();
        location.reload(); 
    };

    window.saveNewGroup = async () => {
        const name = document.getElementById("newGroupName").value.trim();
        const pass = prompt("Guruh uchun parol (bo'sh qoldirsangiz parolsiz bo'ladi):");
        if (!name) return;
        await setDoc(doc(db, "groups", name), { createdAt: serverTimestamp(), password: pass || "" });
        document.getElementById("newGroupName").value = "";
        document.getElementById("create-modal").style.display = "none";
    };
window.targetRoom = ""; // Qaysi xonaga kirmoqchiligini eslab qolamiz

window.enterGroup = async (name) => {
    const groupDoc = await getDoc(doc(db, "groups", name));
    const savedPass = groupDoc.data()?.password;

    if (savedPass) {
        window.targetRoom = name; // Xonani saqlab qo'yamiz
        document.getElementById("password-modal").style.display = "flex";
    } else {
        window.currentRoom = name;
        window.loadMessages();
    }
};

window.checkGroupPassword = async () => {
    const inputPass = document.getElementById("passInput").value;
    const groupDoc = await getDoc(doc(db, "groups", window.targetRoom));
    
    if (inputPass === groupDoc.data().password) {
        window.currentRoom = window.targetRoom;
        window.loadMessages();
        document.getElementById("password-modal").style.display = "none";
        document.getElementById("passInput").value = "";
    } else {
        alert("❌ Parol noto‘g‘ri!");
    }
};

    window.startVideoCall = () => {
        document.getElementById("video-container").style.display = "block";
        // JitsiMeetExternalAPI global kutubxona sifatida yuklangan bo'lishi kerak
        window.jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { 
            roomName: 'GoldShield_' + window.currentRoom, 
            width: '100%', height: '100%', 
            parentNode: document.getElementById("video-container") 
        });
    };

    window.stopVideoCall = () => { 
        if (window.jitsiApi) window.jitsiApi.dispose(); 
        document.getElementById("video-container").style.display = "none"; 
    };

    window.sendMessage = async () => {
        const input = document.getElementById("msgInput");
        if (!input.value.trim()) return;
        await addDoc(collection(db, "groups", window.currentRoom, "messages"), { 
            text: input.value, 
            timestamp: serverTimestamp() 
        });
        input.value = "";
    };

    window.loadMessages = () => {
        if (unsubscribe) unsubscribe();
        unsubscribe = onSnapshot(query(collection(db, "groups", window.currentRoom, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const win = document.getElementById("chat-window");
            win.innerHTML = "";
            snap.forEach(d => win.innerHTML += `<div class="msg">${d.data().text}</div>`);
            win.scrollTop = win.scrollHeight;
        });
    };

    onSnapshot(collection(db, "groups"), (snap) => {
        const list = document.getElementById("group-list");
        list.innerHTML = "";
        snap.forEach((doc) => {
            list.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;">
                <button class="group-item" style="flex:1" onclick="enterGroup('${doc.id}')">${doc.id}</button>
                <button onclick="renameGroup('${doc.id}')">✏️</button>
                <button onclick="deleteGroup('${doc.id}')">🗑️</button>
            </div>`;
        });
    });
</script>
    <style>
        body { background: #0e1621; color: white; display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #sidebar { width: 320px; background: #17212b; padding: 15px; }
        .group-item { padding: 10px; background: #242f3d; color: white; border: none; cursor: pointer; text-align: left; }
        #chat-area { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        #header-menu { background: #242f3d; padding: 10px; display: flex; gap: 10px; justify-content: flex-end; }
        #chat-window { flex: 1; background: #182533; padding: 15px; overflow-y: auto; margin-top: 10px; border-radius: 8px; }
        .msg { padding: 8px 0; border-bottom: 1px solid #101924; }
        #video-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background: black; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Гуруҳлар</h3>
        <button onclick="document.getElementById('create-modal').style.display='block'">+ Гуруҳ яратиш</button>
        <div id="group-list" style="margin-top: 10px;"></div>
    </div>
    <div id="chat-area">
        <div id="header-menu">
            <button onclick="startVideoCall()">🎥 Видео/Аудио</button>
            <a href="index.html" style="color: gold;text-decoration: solid;"> <b> ЧИҚИШ</b></a> 
        </div>
        <div id="chat-window"></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="text" id="msgInput" style="flex:1; padding: 10px;" placeholder="Хабар...">
            <button onclick="sendMessage()">Юбориш</button>
        </div>
    </div>
    <div id="video-container">
        <button onclick="stopVideoCall()" style="position:absolute; top:20px; right:20px; z-index:10000; padding:10px 20px; background:red; color:white; border:none;">X ЧИҚИШ</button>
    </div>
 <!-- Parol uchun yangi modal -->
<div id="password-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; justify-content:center; align-items:center;">
    <div style="background:#17212b; padding:30px; border-radius:15px; width:300px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h3 style="color:white;">🔐 Parolni kiriting</h3>
        <input type="password" id="passInput" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none;">
        <button onclick="checkGroupPassword()" style="width:100%; padding:10px; background:#2b90d9; color:white; border:none; border-radius:5px; cursor:pointer;">Kirish</button>
    </div>
</div>
</body>
</html>
