<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Shield | Global Platform</title>
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGY8okAlFy_fZnK6D9Ja-zrlb-eN_96dyhI_yV1_MWPOj3WxAQmawkxWju&s=10" type="image/x-icon">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: linear-gradient(135deg, #fd51a7 30%, #1a1a24 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: rgba(26, 26, 36, 0.95); padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.3); width: 100%; max-width: 400px; text-align: center; color: white; }
        .google-btn { width: 100%; padding: 14px; border: none; border-radius: 14px; cursor: pointer; background: #e11d48; color: white; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .google-btn:hover { background: #be123c; }
        .lang-select { background: rgba(255,255,255,0.1); color: rgb(230, 101, 101); padding: 8px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="auth-card">
    <select id="langSelector" class="lang-select" onchange="changeLanguage()">
        <option value="uz">🇺🇿 O'zbekcha</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="en">🇬🇧 English</option>
    </select>
    <h2 id="title">Gold Shield International</h2>
    <p id="desc" style="margin-bottom: 30px; color: gold;">Инсон ҳуқуқлари фаоллари ва журналистлар учун махсус платформа.</p>

    <button id="loginBtn" class="google-btn" onclick="loginWithGoogle()">
        <span id="btnText">Google орқали кириш</span>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuPWrC2sKYQuukdc5DEGgR2uduou3CX6U",
        authDomain: "gshn-70234.firebaseapp.com",
        projectId: "gshn-70234",
        storageBucket: "gshn-70234.firebasestorage.app",
        messagingSenderId: "241219226789",
        appId: "1:241219226789:web:af19a95f91a30781aa114c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Til almashinish
    window.changeLanguage = () => {
        const lang = document.getElementById("langSelector").value;
        const trans = {
            uz: { t: "Gold Shield International", d: "Инсон ҳуқуқлари фаоллари ва журналистлар учун махсус платформа.", b: "Google орқали кириш" },
            ru: { t: "Gold Shield International", d: "Специализированная платформа для правозащитников и журналистов.", b: "Войти через Google" },
            en: { t: "Gold Shield International", d: "Platform for human rights defenders and journalists.", b: "Sign in with Google" }
        };
        document.getElementById("title").innerText = trans[lang].t;
        document.getElementById("desc").innerText = trans[lang].d;
        document.getElementById("btnText").innerText = trans[lang].b;
    };

    // Google orqali kirish funksiyasi
    window.loginWithGoogle = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            alert("Xush kelibsiz, " + result.user.displayName);
            window.location.href = "chat.html"; // Muvaffaqiyatli kirgach chatga yo'naltiramiz
        } catch (error) {
            console.error("Xatolik:", error);
            alert("Kirishda xatolik yuz berdi: " + error.message);
        }
    };
</script>
</body>
</html>
